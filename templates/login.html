{% extends 'base.html' %}
{% block title %}Login - Elevate Workforce Solutions{% endblock %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card premium-card border-0 shadow-lg p-4 p-md-5 bg-white">
                <div class="text-center mb-4">
                    <div class="bg-primary-light d-inline-flex p-3 rounded-circle text-primary mb-3">
                        <i class="fa-solid fa-lock fs-3"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Welcome Back</h3>
                    <p class="text-muted small">Access your Elevate Workforce account</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark small"><i class="fa-solid fa-user me-1 text-primary"></i> Username</label>
                        <input type="text" name="username" class="form-control form-control-custom" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-dark small"><i class="fa-solid fa-key me-1 text-primary"></i> Password</label>
                        <input type="password" name="password" class="form-control form-control-custom" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-custom btn-custom-primary w-100 py-3 mt-2 shadow-sm">
                        <i class="fa-solid fa-right-to-bracket me-2"></i> Log In
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">
                        Don't have an account yet? 
                        <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none ms-1">Register here <i class="fa-solid fa-arrow-right-long text-xs ms-1"></i></a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
